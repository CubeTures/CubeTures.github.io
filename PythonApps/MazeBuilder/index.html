<!DOCTYPE html>
<html>
    <head>
        <title>Maze</title>
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
        <script src="Maze.js"></script>
        <style>
            .center {
              margin: auto;
              width: 751px;
              border: 3px solid white;
              padding: 10px;
            }
            .centerText {
              text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="center">
            <canvas id="canvas"></canvas>
        </div>
        <div class="d-flex justify-content-around" style="width:50vw; margin:auto">
            <div class="p-2">
                <label for="hSlider" class="form-label">Height</label>
                <input id="hSlider" type="range" value="10" min="2" max="100" oninput="this.nextElementSibling.value = this.value">
                <output id="hsv">10</output>
            </div>

            <div class="p-2">
                <label for="lSlider" class="form-label">Length</label>
                <input id="lSlider" type="range" value="10" min="2" max="100" oninput="this.nextElementSibling.value = this.value">
                <output id="lsv">10</output>
            </div>

            <div class="p-2">
                <button id="generate">Generate</button>
            </div>
            

            <div class="p-2">   
                <button id="solve">Solve</button>
            </div>
            
        </div>
    </body>
</html>
