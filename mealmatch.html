<!DOCTYPE html>
<html lang="en">
    <head>
       <title>MealMatch</title>
       <!-- Font: Baloo Bhaina 2 -->
    </head>
    <body class="bg-dark text-light">
        <nav class="navbar top-div fixed-bottom">
            <div class="container-fluid justify-content-evenly">
                <button class="image-button" href="#">
                    <img class="toolbar-image" src="/Images/MealMatch/Friends.svg">
                </button>
                <button class="image-button" href="#">
                    <img class="toolbar-image" src="/Images/MealMatch/Add_square.svg">
                </button>
                <button class="image-button" href="#">
                    <img class="toolbar-image" src="/Images/MealMatch/Home.svg">
                </button>
            </div>
        </nav>

        <div class="top-div">
            <br/>
            <h1>MealMatch</h1>
            <br/>
        </div>
        
        <button id="login">Login</button>
        
        <span>
            <p>Coordinates:</p>
            <input type="text" id="latitude">
            <input type="text" id="longitude">
            <button id="mylocation">Use My Location</button>

            <p>Radius (Miles):</p>
            <input type="number" min="5" value="25" max="60" id="radius">

            <p>Number of Results:</p>
            <input type="number" min="5" value="10" max="50" id="numresults">
        </span>

        <br/>
        <br/>
        <button id="search">Search</button>
        <br/>
        <br/>
        <h1>1</h1>
        <h1>2</h1>
        <h1>3</h1>
        <h1>4</h1>
        <h1>5</h1>
        <h1>6</h1>
        <h1>7</h1>
        <h1>8</h1>
        <h1>9</h1>

        <p id="data">Data</p>        
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        <link href="/Include/MealMatch/mealmatch.css" rel="stylesheet">
        <script type="module" src="/Include/MealMatch/InitializeFirebase.js"></script>
        <script type="module" src="/Include/MealMatch/FirebaseLogin.js"></script>
        <script type="module" src="/Include/MealMatch/FourSquarePlaces.js"></script>
        <script type="module" src="/Include/MealMatch/NewMatch.js"></script>
    </body>
</html>
