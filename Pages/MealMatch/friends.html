<!DOCTYPE html>
<html lang="en">
    <head>
       <title>MealMatch</title>
       <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body class="dark-color text-light">
        <!-- Toolbar -->
        <nav class="navbar top-div fixed-bottom top-border" id="toolbar">
            <div class="container-fluid justify-content-evenly">
                <a type="button" class="btn image-button" href="/Pages/MealMatch/friends.html">
                    <img class="toolbar-image" src="/Images/MealMatch/Friends.svg">
                </a>
                <a type="button" class="btn image-button" href="/Pages/MealMatch/newmatch.html">
                    <img class="toolbar-image" src="/Images/MealMatch/Add_square.svg">
                </a>
                <a type="button" class="btn image-button" href="/mealmatch.html">
                    <img class="toolbar-image" src="/Images/MealMatch/Home.svg">
                </a>
            </div>
        </nav>

        <!-- Header -->
        <div class="top-div sticky-top bottom-border">
            <br/>
            <h1 class="xl-font">Friends</h1>
            <br/>
        </div>

        <br/> <!-- Friend Code -->
        <div>
            <div class="primary-color rounded padded">
                <div class="justify-content-between d-flex">
                    <p class="l-font">Friend Code</p>
                    <button type="button" class="image-button" id="copy">
                        <img class="pill-image" src="/Images/MealMatch/Copy.svg">
                    </button>
                </div>
                <p id="friendcode"></p>
            </div>
            <br/>
        </div>

        
        <div> <!-- Send Friend Request -->
            <div class="primary-color rounded padded">
                <div class="justify-content-between" style="display:flex">
                    <p class="l-font">Send Request</p>
                </div>
                <div class="input-group mb-3" data-bs-theme="dark">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="friend-request" placeholder="Code">
                        <label for="friend-request">Friend Code</label>
                    </div>
                    <button class="btn btn-outline-light" type="button" id="send-request">Send</button>
                </div>
            </div>
            <br/>
        </div>

        <!-- Friend Requests -->
        <div>
            <div class="primary-color rounded padded">
                <div class="justify-content-between d-flex">
                    <p class="l-font">Friend Requests</p>
                    <img class="pill-image" src="/Images/MealMatch/Expand_up.svg">
                </div>
            </div>
            <br/>
        </div>

        <!-- Toast -->
        <div class="toast-container position-fixed top-0 end-0 p-3">
            <div class="toast align-items-center" data-bs-theme="dark" role="alert" aria-live="assertive" aria-atomic="true" id="liveToast">
                <div class="d-flex">
                    <div class="toast-body" id="toast-text">
                         Copied to Clipboard!
                    </div>
                    <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        </div>
        

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        
        <link href="/Include/MealMatch/mealmatch.css" rel="stylesheet">
        <script type="module" src="/Include/MealMatch/firebase-database.js"></script>
        <script type="module" src="/Include/MealMatch/friends.js"></script>
    </body>
</html>
