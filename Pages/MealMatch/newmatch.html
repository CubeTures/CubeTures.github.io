<!DOCTYPE html>
<html lang="en">
    <head>
        <title>MealMatch</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" type="image/x-icon" href="/Images/MealMatch/Logo (Simple).svg">
     </head>

    <body class="dark-color text-light">
        <!-- Toolbar -->
        <nav class="navbar top-div fixed-bottom top-border" id="toolbar">
            <div class="container-fluid justify-content-evenly">
                <a type="button" class="btn image-button" href="/Pages/MealMatch/friends.html">
                    <img class="toolbar-image" src="/Images/MealMatch/Friends.svg">
                </a>
                <a type="button" class="btn image-button" href="/Pages/MealMatch/newmatch.html">
                    <img class="toolbar-image" src="/Images/MealMatch/Add_square.svg">
                </a>
                <a type="button" class="btn image-button" href="/index.html">
                    <img class="toolbar-image" src="/Images/MealMatch/Home.svg">
                </a>
            </div>
        </nav>

        <!-- Header -->
        <div class="top-div sticky-top bottom-border">
            <br/>
            <h1 class="xl-font">New Match</h1>
            <br/>
        </div>

        <br/> <!-- Location -->
        <div>
            <div class="primary-color rounded padded">
                <div class="justify-content-between d-flex">
                    <p class="l-font">Location</p>
                    <div class="d-flex">
                        <button type="button" class="image-button" id="current-location">
                            <img class="pill-image" src="/Images/MealMatch/Pin_alt.svg">
                        </button>
                        <button type="button" class="image-button" id="location-info" data-bs-toggle="modal" data-bs-target="#locationModal">
                            <img class="pill-image" src="/Images/MealMatch/Info.svg">
                        </button>
                    </div>
                </div>
                <div class="input-group mb-3" data-bs-theme="dark">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="address-input" placeholder="">
                        <label for="address-input">Address</label>
                    </div>
                </div>
                <div class="input-group mb-3" data-bs-theme="dark">
                    <div class="form-floating">
                        <input type="number" class="form-control colored-input" id="latitude-input" placeholder="">
                        <label for="latitude-input">Latitude</label>
                    </div>
                    <div class="form-floating">
                        <input type="number" class="form-control colored-input" id="longitude-input" placeholder="">
                        <label for="longitude-input">Longitude</label>
                    </div>
                </div>
            </div>
            <br/>
        </div>

        <!-- Radius -->
        <div>
            <div class="primary-color rounded padded">
                <div class="d-flex justify-content-between">
                    <p class="l-font">Radius</p>
                    <button type="button" class="image-button" id="radius-info" data-bs-toggle="modal" data-bs-target="#radiusModal">
                        <img class="pill-image" src="/Images/MealMatch/Info.svg">
                    </button>
                </div>
                <div class="input-group mb-3" data-bs-theme="dark">
                    <div class="form-floating">
                        <input type="number" class="form-control colored-input" id="radius-input" placeholder="" value="10" units="miles">
                        <label for="radius-input">Radius</label>
                    </div>
                    <button class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="radius-label">Miles</button>
                    <ul class="dropdown-menu dropdown-menu-end" data-bs-theme="light">
                        <li id="miles-button"><a class="dropdown-item" >Miles</a></li>
                        <li id="meters-button"><a class="dropdown-item">Meters</a></li>
                    </ul>
                </div>
            </div>
            <br/>
        </div>

        <!-- People -->
        <div>
            <div class="primary-color rounded padded padded-bottom" id="people">
                <div class="d-flex justify-content-between">
                    <p class="l-font">People</p>
                    <button type="button" class="image-button" id="people-info" data-bs-toggle="modal" data-bs-target="#peopleModal">
                        <img class="pill-image" src="/Images/MealMatch/Info.svg">
                    </button>
                </div>
                <!-- Flexbox -->
                <div class="d-flex flex-wrap" id="people-container">
                    <template id="people-template">
                        <input type="checkbox" class="btn-check" id="input">
                        <label class="btn btn-outline-light flex-wrap-checkbox" for="checkbox" id="label"> 
                            Person 1
                        </label>
                    </template>
                    <p class="s-font" id="people-disclaimer">You have no friends.</p>
                </div>
            </div>
            <br/>
        </div>

        <div>
            <div class="text-center">
                <button class="btn btn-outline-light white-border" id="test-location">Location</button>
                <button class="btn btn-outline-light white-border" id="test-radius">Radius</button>
                <button class="btn btn-outline-light white-border" id="test-people">People</button>
            </div>
            <br/>
            <div class="text-center">
                <button class="btn btn-outline-light white-border" id="match">Match</button>
            </div>
            <br>
        </div>
        
        <!-- Location Modal -->
        <div class="modal fade" id="locationModal" tabindex="-1" aria-labelledby="locationModalLabel" aria-hidden="true" data-bs-theme="dark">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="locaitonModalLabel">Location</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Information on how to input
                </div>
            </div>
            </div>
        </div>

        <!-- Radius Modal -->
        <div class="modal fade" id="radiusModal" tabindex="-1" aria-labelledby="radiusModalLabel" aria-hidden="true" data-bs-theme="dark">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="radiusModalLabel">Radius</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Information on how to input
                </div>
            </div>
            </div>
        </div>

        <!-- People Modal -->
        <div class="modal fade" id="peopleModal" tabindex="-1" aria-labelledby="peopleModalLabel" aria-hidden="true" data-bs-theme="dark">
            <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="peopleModalLabel">People</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Information on how to input
                </div>
            </div>
            </div>
        </div>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
        
        <link href="/Include/MealMatch/mealmatch.css" rel="stylesheet">
        <script type="module" src="/Include/MealMatch/initialize-firebase.js"></script>
        <script type="module" src="/Include/MealMatch/firebase-database.js"></script>
        <script type="module" src="/Include/MealMatch/new-match.js"></script>
        <!--script type="module" src="/Include/MealMatch/tomtom-api.js"></script>
        <script type="module" src="/Include/MealMatch/google-api.js"></script-->
    </body>
</html>
