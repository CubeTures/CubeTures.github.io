<!DOCTYPE html>
<html>
  <head>
    <title>Word Guessing Game</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <script src="script.js"></script>

    <style>
      .center {
        margin: auto;
        width: 50%;
        border: 3px solid white;
        padding: 10px;
      }
      .centerText {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="center bg-dark text-white">
      <h1 class="centerText">Word Guessing Game</h1>

      <div class="input-group mb-3">
        <input id="word" type="text" class="form-control bg-dark text-white" placeholder="Type your guess here" aria-label="Recipient's username" aria-describedby="button-addon2">
        <button class="btn btn-outline-secondary" type="button" id="guess">Guess</button>
        <button class="btn btn-outline-secondary" type="button" id="reset">New Game</button>
      </div>

      <div class="centerText" id="results" style="border:1px solid white"></div>
  </div>
  </body>
</html>
